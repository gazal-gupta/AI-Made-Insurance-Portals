<!DOCTYPE html>
<html lang="en-OM">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al Falaj Assurance — Employee Benefits Sales Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">AF</div>
      <div class="brand-name">
        <span class="brand-title">Al Falaj Assurance</span>
        <span class="brand-sub">EMPLOYEE BENEFITS SALES</span>
      </div>
    </div>

    <nav class="side-nav" id="sideNav">
      <a href="#/dashboard" data-route="dashboard" class="nav-item">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard</a>
      <a href="#/pipeline" data-route="pipeline" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M4 5h16M4 12h16M4 19h10"/></svg>
        Pipeline</a>
      <a href="#/underwriting-queue" data-route="underwriting-queue" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M12 2.5 20 6v6c0 5-3.4 8.3-8 9.5C7.4 20.3 4 17 4 12V6z"/><path d="M8.5 12.5 11 15l4.5-5"/></svg>
        Underwriting Queue</a>
      <a href="#/approvals" data-route="approvals" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8.5 12.2l2.4 2.4 4.6-4.9"/></svg>
        Approvals</a>
      <a href="#/broker-book" data-route="broker-book" class="nav-item">
        <svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M3 12h18"/></svg>
        Broker Book</a>

      <div class="nav-section">Reference</div>
      <a href="#/playbook" data-route="playbook" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M6 2.5h8.5L19 7v14.5H6z"/><path d="M14 3v4.5h4.5"/><path d="M9 12h7M9 15.5h7"/></svg>
        Playbook</a>
    </nav>

    <div class="role-switch">
      <select id="roleSwitch"></select>
    </div>
    <div class="side-user">
      <div class="avatar" id="sideUserAvatar">SB</div>
      <div class="side-user-info">
        <span class="side-user-name" id="sideUserName">Salim Al Balushi</span>
        <span class="side-user-role" id="sideUserRole">Sales Executive</span>
      </div>
    </div>
  </aside>

  <!-- ============ MAIN COLUMN ============ -->
  <div class="main-col">

    <header class="topbar">
      <div class="search-wrap" id="searchWrap">
        <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.8-3.8"/></svg>
        <input id="globalSearch" type="text" placeholder="Search companies, contacts, brokers…" autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>
      <div class="topbar-right">
        <span class="env-chip"><span class="env-dot"></span>GMC &amp; GTL — Assisted Sales</span>
        <button class="bell-btn" id="bellBtn" aria-label="Notifications">
          <svg viewBox="0 0 24 24"><path d="M18 8.5a6 6 0 1 0-12 0c0 7-2.5 8.5-2.5 8.5h17S18 15.5 18 8.5"/><path d="M13.8 20.5a2 2 0 0 1-3.6 0"/></svg>
          <span class="bell-badge" id="bellBadge">0</span>
        </button>
        <div class="bell-panel" id="bellPanel"></div>
      </div>
    </header>

    <main id="view" class="view"></main>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalBox"></div></div>
<div class="toast-stack" id="toastStack"></div>

<script src="js/data.js"></script>
<script src="js/ui.js"></script>
<script src="js/journey.js"></script>
<script src="js/views-dashboard.js"></script>
<script src="js/views-employer.js"></script>
<script src="js/views-benefits.js"></script>
<script src="js/views-underwriting.js"></script>
<script src="js/views-quote.js"></script>
<script src="js/views-closing.js"></script>
<script src="js/views-case-shell.js"></script>
<script src="js/app.js"></script>
</body>
</html>
