<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albright &amp; Hayes — Broker Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">A&amp;H</div>
      <div class="brand-name">
        <span class="brand-title">Albright &amp; Hayes</span>
        <span class="brand-sub">INSURANCE BROKERS LTD</span>
      </div>
    </div>

    <nav class="side-nav" id="sideNav">
      <a href="#/dashboard" data-route="dashboard" class="nav-item">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard</a>
      <a href="#/clients" data-route="clients" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-6 6.5-6s6.5 2.4 6.5 6"/><circle cx="17" cy="9" r="2.5"/><path d="M17.5 14.5c2.4.4 4 2.3 4 5"/></svg>
        Clients</a>
      <a href="#/policies" data-route="policies" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M6 2.5h8.5L19 7v14.5H6z"/><path d="M14 3v4.5h4.5"/><path d="M9 12h7M9 15.5h7"/></svg>
        Policies</a>
      <a href="#/quotes" data-route="quotes" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M6 2.5h8.5L19 7v14.5H6z"/><path d="M14 3v4.5h4.5"/><path d="M12.5 10.5v7M9 14h7"/></svg>
        Quotes</a>
      <a href="#/renewals" data-route="renewals" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-2.3 6.3"/><path d="M20 5.5V11h-5.5"/></svg>
        Renewals</a>
      <a href="#/claims" data-route="claims" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M12 2.5 20 6v6c0 5-3.4 8.3-8 9.5C7.4 20.3 4 17 4 12V6z"/><path d="M12 8.5v4.5"/><circle cx="12" cy="16.2" r="0.4"/></svg>
        Claims</a>
      <a href="#/payments" data-route="payments" class="nav-item">
        <svg viewBox="0 0 24 24"><rect x="2.5" y="5.5" width="19" height="13" rx="2"/><path d="M2.5 10h19M6.5 14.5H11"/></svg>
        Payments</a>

      <div class="nav-section">Administration</div>
      <a href="#/reports" data-route="reports" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M4 20.5h17"/><rect x="5.5" y="11" width="3.4" height="7" rx="0.8"/><rect x="10.8" y="6.5" width="3.4" height="11.5" rx="0.8"/><rect x="16.1" y="9" width="3.4" height="9" rx="0.8"/></svg>
        Reports</a>
      <a href="#/settings" data-route="settings" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.7l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.7-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.2a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.7.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.7 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.2a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.7.3h.1a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.2a1.6 1.6 0 0 0 1 1.5h.1a1.6 1.6 0 0 0 1.7-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.7v.1a1.6 1.6 0 0 0 1.5 1h.2a2 2 0 1 1 0 4h-.2a1.6 1.6 0 0 0-1.5 1z"/></svg>
        Settings</a>
    </nav>

    <div class="side-user">
      <div class="avatar">EW</div>
      <div class="side-user-info">
        <span class="side-user-name">Eleanor Whitcombe</span>
        <span class="side-user-role">Senior Broker</span>
      </div>
    </div>
  </aside>

  <!-- ============ MAIN COLUMN ============ -->
  <div class="main-col">

    <header class="topbar">
      <div class="search-wrap" id="searchWrap">
        <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.8-3.8"/></svg>
        <input id="globalSearch" type="text" placeholder="Search clients, policies, or claims…" autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>
      <div class="topbar-right">
        <span class="fca-chip"><span class="fca-dot"></span>FCA Reg: 712483</span>
        <button class="bell-btn" id="bellBtn" aria-label="Notifications">
          <svg viewBox="0 0 24 24"><path d="M18 8.5a6 6 0 1 0-12 0c0 7-2.5 8.5-2.5 8.5h17S18 15.5 18 8.5"/><path d="M13.8 20.5a2 2 0 0 1-3.6 0"/></svg>
          <span class="bell-badge" id="bellBadge">0</span>
        </button>
        <div class="bell-panel" id="bellPanel"></div>
        <button class="btn btn-gold" data-action="new-quote">New Quote</button>
      </div>
    </header>

    <main id="view" class="view"></main>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalBox"></div></div>
<div class="toast-stack" id="toastStack"></div>
<div class="chart-tip" id="chartTip"></div>

<script src="js/data.js"></script>
<script src="js/ui.js"></script>
<script src="js/views-main.js"></script>
<script src="js/views-ops.js"></script>
<script src="js/app.js"></script>
</body>
</html>
